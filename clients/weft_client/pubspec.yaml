name: weft_client
description: WEFT Desktop Client - Flutter frontend for weft-core
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # HTTP + SSE
  dio: ^5.8.0+1

  # WebSocket
  web_socket_channel: ^3.0.2

  # 本地存储
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # JSON 序列化
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 窗口管理
  window_manager: ^0.4.3

  # UI
  google_fonts: ^6.2.1
  flutter_highlight: ^0.7.0
  flutter_markdown: ^0.7.6
  # 工具
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_widget_from_html_core: ^0.17.2
  # 内嵌 webview（HTML 产物渲染，Manus 式工作区预览）。
  # Windows: webview_windows（WebView2/Edge 内核，系统运行时已装）。
  # macOS/Linux 后续按各自原生内核接入（WKWebView / WebKitGTK），调用方走统一抽象。
  webview_windows: ^0.4.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  file_picker: ^11.0.2
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
