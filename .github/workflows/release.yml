name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

# Avoid overlapping runs if a tag is re-pushed; let the newest win.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- 0. Detect which components changed vs previous tag -------------------
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.diff.outputs.core }}
      packages: ${{ steps.diff.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Diff against previous tag
        id: diff
        shell: bash
        run: |
          prev=$(git tag --sort=-v:refname | grep -v "^$(git describe --tags --exact-match 2>/dev/null)$" | head -1)
          if [ -z "$prev" ]; then
            echo "core=true" >> "$GITHUB_OUTPUT"
            echo "packages=true" >> "$GITHUB_OUTPUT"
          else
            core_changed=$(git diff --name-only "$prev"..HEAD -- core/ | head -1)
            pkg_changed=$(git diff --name-only "$prev"..HEAD -- packages/official/ packages/installed/ scripts/build-wasm-packages.sh | head -1)
            echo "core=$( [ -n \"$core_changed\" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "packages=$( [ -n \"$pkg_changed\" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          fi
          echo "prev=$prev core=${{ steps.diff.outputs.core || 'pending' }} packages=${{ steps.diff.outputs.packages || 'pending' }}"

  # ---- 1. Build the native core binaries -----------------------------------
  # Windows-only for now. macOS/Linux targets are unverified — add them back to
  # the matrix once they're tested.
  core:
    name: core (${{ matrix.target }})
    needs: [changes]
    if: needs.changes.outputs.core == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: weft-core-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build core binaries
        # `core` is its own workspace root, so build from its directory.
        working-directory: core
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          bin_dir="core/target/${{ matrix.target }}/release"
          for b in weft-core weft weft-sign weft-rpc; do
            if [[ -f "$bin_dir/$b" ]]; then cp "$bin_dir/$b" dist/; fi
            if [[ -f "$bin_dir/$b.exe" ]]; then cp "$bin_dir/$b.exe" dist/; fi
          done
          cp config.example.toml dist/ 2>/dev/null || true

      - name: Package archive
        shell: bash
        run: |
          cd dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "../${{ matrix.archive }}.zip" ./*
          else
            tar czf "../${{ matrix.archive }}.tar.gz" ./*
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}.zip
            ${{ matrix.archive }}.tar.gz
          if-no-files-found: ignore

  # ---- 2. Build all WASM packages (platform-independent) --------------------
  packages:
    name: wasm packages
    needs: [changes]
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build WASM packages
        run: bash scripts/build-wasm-packages.sh dist-packages

      - name: Package archive
        run: tar czf weft-packages.tar.gz -C dist-packages .

      - uses: actions/upload-artifact@v4
        with:
          name: weft-packages
          path: weft-packages.tar.gz

  # ---- 2b. Bundle the desktop app: Flutter client + core + WASM packages ----
  # Produces a ready-to-run Windows bundle where the client auto-launches the
  # bundled weft-core (sidecar) — no separate install needed.
  app-windows:
    name: desktop app (windows)
    needs: [changes]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build core (release)
        # `core` is its own workspace root, so build from its directory.
        working-directory: core
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build WASM packages
        shell: bash
        run: bash scripts/build-wasm-packages.sh

      - name: Build package UIs (rss-reader)
        working-directory: packages/official/rss-reader/ui
        run: |
          npm install
          npm run build

      - name: Build Flutter client
        working-directory: clients/weft_client
        # The webview_windows plugin still includes <experimental/coroutine>,
        # which recent MSVC toolchains turn into a hard error (STL1011). Inject
        # the documented silence macro via the CL env var so MSVC accepts it.
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: |
          flutter pub get
          flutter build windows --release

      - name: Assemble bundle
        shell: bash
        run: |
          bundle="weft-desktop-windows-x86_64"
          app="clients/weft_client/build/windows/x64/runner/Release"
          mkdir -p "$bundle"
          cp -r "$app"/* "$bundle"/
          # Sidecar core next to the client exe (matches CoreProcessManager search).
          cp core/target/x86_64-pc-windows-msvc/release/weft-core.exe "$bundle"/
          for b in weft weft-sign weft-rpc; do
            [ -f "core/target/x86_64-pc-windows-msvc/release/$b.exe" ] && cp "core/target/x86_64-pc-windows-msvc/release/$b.exe" "$bundle"/ || true
          done
          # Package metadata, compiled wasm, product declarations, and service
          # assets so the core can load packages AND discover product apps.
          mkdir -p "$bundle/packages"
          cp packages/index.toml "$bundle/packages"/ 2>/dev/null || true

          # 1) Product packages (root-level in packages/ — these define apps).
          for d in packages/*/; do
            name=$(basename "$d")
            [[ "$name" == "official" || "$name" == "sdk" || "$name" == "installed" ]] && continue
            [ -f "$d/package.toml" ] || continue
            cp -r "$d" "$bundle/packages/$name"
            # Remove build artifacts that shouldn't ship.
            rm -rf "$bundle/packages/$name/target" "$bundle/packages/$name/src" \
                   "$bundle/packages/$name/Cargo.toml" "$bundle/packages/$name/.gitignore"
          done

          # 2) Official packages — copy all that have a manifest (not just wasm).
          for d in packages/official/*/; do
            name=$(basename "$d")
            [ -f "$d/package.toml" ] || continue
            mkdir -p "$bundle/packages/official/$name"
            cp "$d/package.toml" "$bundle/packages/official/$name"/
            # Compiled wasm (if built by the WASM step above).
            [ -f "$d/package.wasm" ] && cp "$d/package.wasm" "$bundle/packages/official/$name"/
            # UI assets for packages that serve web interfaces.
            [ -d "$d/ui" ] && cp -r "$d/ui" "$bundle/packages/official/$name"/
            # Service runtime assets (Python/JS services, skill definitions).
            [ -d "$d/service" ] && cp -r "$d/service" "$bundle/packages/official/$name"/
            [ -d "$d/hermes_port" ] && cp -r "$d/hermes_port" "$bundle/packages/official/$name"/
            [ -d "$d/ga_runtime" ] && cp -r "$d/ga_runtime" "$bundle/packages/official/$name"/
            [ -f "$d/server.py" ] && cp "$d/server.py" "$bundle/packages/official/$name"/
            # Scenes (capability scenarios).
            [ -d "$d/scenes" ] && cp -r "$d/scenes" "$bundle/packages/official/$name"/
            # Remove build artifacts that shouldn't ship.
            rm -rf "$bundle/packages/official/$name/target" \
                   "$bundle/packages/official/$name/src" \
                   "$bundle/packages/official/$name/Cargo.toml" \
                   "$bundle/packages/official/$name/.gitignore"
            # Strip UI source/dev files; core only needs ui/dist/.
            if [ -d "$bundle/packages/official/$name/ui" ]; then
              rm -rf "$bundle/packages/official/$name/ui/node_modules" \
                     "$bundle/packages/official/$name/ui/src" \
                     "$bundle/packages/official/$name/ui/.gitignore" \
                     "$bundle/packages/official/$name/ui/package.json" \
                     "$bundle/packages/official/$name/ui/package-lock.json" \
                     "$bundle/packages/official/$name/ui/tsconfig.json" \
                     "$bundle/packages/official/$name/ui/tsconfig.*.json" \
                     "$bundle/packages/official/$name/ui/vite.config.*" \
                     "$bundle/packages/official/$name/ui/eslint.config.*" \
                     "$bundle/packages/official/$name/ui/index.html"
            fi
          done

          # 3) Installed packages — built WASM packages from packages/installed/.
          for d in packages/installed/*/; do
            name=$(basename "$d")
            [ -f "$d/package.toml" ] || continue
            mkdir -p "$bundle/packages/installed/$name"
            cp "$d/package.toml" "$bundle/packages/installed/$name"/
            # Compiled wasm (if built by the WASM step above).
            [ -f "$d/package.wasm" ] && cp "$d/package.wasm" "$bundle/packages/installed/$name"/
            # Service runtime assets (if any).
            [ -d "$d/service" ] && cp -r "$d/service" "$bundle/packages/installed/$name"/
            [ -d "$d/scenes" ] && cp -r "$d/scenes" "$bundle/packages/installed/$name"/
            # Remove build artifacts that shouldn't ship.
            rm -rf "$bundle/packages/installed/$name/target" \
                   "$bundle/packages/installed/$name/src" \
                   "$bundle/packages/installed/$name/Cargo.toml" \
                   "$bundle/packages/installed/$name/.gitignore"
          done
          cp config.example.toml "$bundle"/ 2>/dev/null || true
          7z a "$bundle.zip" "./$bundle/*"

      - name: Assemble full bundle (with tool-selector AI runtime)
        shell: bash
        run: |
          bundle="weft-desktop-windows-x86_64"
          full="weft-desktop-windows-x86_64-full"
          # Start from the slim bundle.
          cp -r "$bundle" "$full"
          # Download the prebuilt tool-selector runtime + ONNX model from the
          # universal-selector release into the package's runtime/ dir.
          ts="$full/packages/official/tool-selector/runtime"
          mkdir -p "$ts/models"
          base="https://github.com/ailiheizi/universal-selector/releases/download/v0.1.0"
          curl -fL --retry 3 -o "$ts/tool-selector.exe" "$base/tool-selector.exe"
          curl -fL --retry 3 -o "$ts/models/model_int8.onnx" "$base/model_int8.onnx"
          curl -fL --retry 3 -o "$ts/models/tokenizer.json" "$base/tokenizer.json"
          curl -fL --retry 3 -o "$ts/models/tokenizer_config.json" "$base/tokenizer_config.json"
          # Point the package entry at the native exe (full edition only).
          tsel="$full/packages/official/tool-selector/package.toml"
          if [ -f "$tsel" ]; then
            sed -i 's#^entry = .*#entry = "runtime/tool-selector.exe"#' "$tsel"
            sed -i 's#^startup_command = .*#startup_command = "runtime/tool-selector.exe"#' "$tsel"
            sed -i 's#^startup_args = .*#startup_args = ["--http", "--port", "17860", "--libraries-dir", "service/libraries"]#' "$tsel"
          fi
          7z a "$full.zip" "./$full/*"

      - uses: actions/upload-artifact@v4
        with:
          name: weft-desktop-windows-x86_64
          path: |
            weft-desktop-windows-x86_64.zip
            weft-desktop-windows-x86_64-full.zip

  # ---- 3. Publish the GitHub Release with all artifacts ---------------------
  release:
    name: publish release
    needs: [changes, core, packages, app-windows]
    # Run even if core/packages were skipped (no changes). Only skip if a job failed.
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
