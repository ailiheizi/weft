name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- 1. Build the native core binaries on each platform -------------------
  core:
    name: core (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: weft-core-windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: weft-core-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: weft-core-linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build core binaries
        run: cargo build --release --target ${{ matrix.target }} -p weft-core

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          bin_dir="target/${{ matrix.target }}/release"
          for b in weft-core weft weft-sign weft-rpc; do
            if [[ -f "$bin_dir/$b" ]]; then cp "$bin_dir/$b" dist/; fi
            if [[ -f "$bin_dir/$b.exe" ]]; then cp "$bin_dir/$b.exe" dist/; fi
          done
          cp config.example.toml dist/ 2>/dev/null || true

      - name: Package archive
        shell: bash
        run: |
          cd dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "../${{ matrix.archive }}.zip" ./*
          else
            tar czf "../${{ matrix.archive }}.tar.gz" ./*
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}.zip
            ${{ matrix.archive }}.tar.gz
          if-no-files-found: ignore

  # ---- 2. Build all WASM packages (platform-independent) --------------------
  packages:
    name: wasm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build WASM packages
        run: bash scripts/build-wasm-packages.sh dist-packages

      - name: Package archive
        run: tar czf weft-packages.tar.gz -C dist-packages .

      - uses: actions/upload-artifact@v4
        with:
          name: weft-packages
          path: weft-packages.tar.gz

  # ---- 3. Publish the GitHub Release with all artifacts ---------------------
  release:
    name: publish release
    needs: [core, packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
