name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

# Avoid overlapping runs if a tag is re-pushed; let the newest win.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- 1. Build the native core binaries -----------------------------------
  # Windows-only for now. macOS/Linux targets are unverified — add them back to
  # the matrix once they're tested.
  core:
    name: core (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: weft-core-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build core binaries
        # `core` is its own workspace root, so build from its directory.
        working-directory: core
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          bin_dir="core/target/${{ matrix.target }}/release"
          for b in weft-core weft weft-sign weft-rpc; do
            if [[ -f "$bin_dir/$b" ]]; then cp "$bin_dir/$b" dist/; fi
            if [[ -f "$bin_dir/$b.exe" ]]; then cp "$bin_dir/$b.exe" dist/; fi
          done
          cp config.example.toml dist/ 2>/dev/null || true

      - name: Package archive
        shell: bash
        run: |
          cd dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "../${{ matrix.archive }}.zip" ./*
          else
            tar czf "../${{ matrix.archive }}.tar.gz" ./*
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}.zip
            ${{ matrix.archive }}.tar.gz
          if-no-files-found: ignore

  # ---- 2. Build all WASM packages (platform-independent) --------------------
  packages:
    name: wasm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build WASM packages
        run: bash scripts/build-wasm-packages.sh dist-packages

      - name: Package archive
        run: tar czf weft-packages.tar.gz -C dist-packages .

      - uses: actions/upload-artifact@v4
        with:
          name: weft-packages
          path: weft-packages.tar.gz

  # ---- 2b. Bundle the desktop app: Flutter client + core + WASM packages ----
  # Produces a ready-to-run Windows bundle where the client auto-launches the
  # bundled weft-core (sidecar) — no separate install needed.
  app-windows:
    name: desktop app (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build core (release)
        # `core` is its own workspace root, so build from its directory.
        working-directory: core
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build WASM packages
        shell: bash
        run: bash scripts/build-wasm-packages.sh

      - name: Build Flutter client
        working-directory: clients/weft_client
        # The webview_windows plugin still includes <experimental/coroutine>,
        # which recent MSVC toolchains turn into a hard error (STL1011). Inject
        # the documented silence macro via the CL env var so MSVC accepts it.
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: |
          flutter pub get
          flutter build windows --release

      - name: Assemble bundle
        shell: bash
        run: |
          bundle="weft-desktop-windows-x86_64"
          app="clients/weft_client/build/windows/x64/runner/Release"
          mkdir -p "$bundle"
          cp -r "$app"/* "$bundle"/
          # Sidecar core next to the client exe (matches CoreProcessManager search).
          cp core/target/x86_64-pc-windows-msvc/release/weft-core.exe "$bundle"/
          for b in weft weft-sign weft-rpc; do
            [ -f "core/target/x86_64-pc-windows-msvc/release/$b.exe" ] && cp "core/target/x86_64-pc-windows-msvc/release/$b.exe" "$bundle"/ || true
          done
          # Package metadata + compiled wasm so the core can load packages.
          mkdir -p "$bundle/packages"
          cp packages/index.toml "$bundle/packages"/ 2>/dev/null || true
          for d in packages/official/*/; do
            name=$(basename "$d")
            if [ -f "$d/package.wasm" ]; then
              mkdir -p "$bundle/packages/official/$name"
              cp "$d/package.toml" "$bundle/packages/official/$name"/ 2>/dev/null || true
              cp "$d/package.wasm" "$bundle/packages/official/$name"/
            fi
          done
          cp config.example.toml "$bundle"/ 2>/dev/null || true
          7z a "$bundle.zip" "./$bundle/*"

      - uses: actions/upload-artifact@v4
        with:
          name: weft-desktop-windows-x86_64
          path: weft-desktop-windows-x86_64.zip

  # ---- 3. Publish the GitHub Release with all artifacts ---------------------
  release:
    name: publish release
    needs: [core, packages, app-windows]
    # Only publish for real tag pushes. A manual workflow_dispatch can still run
    # the build jobs above for testing, but has no tag for the release to attach to.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
